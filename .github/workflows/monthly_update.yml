name: Monthly Dashboard Update

on:
  schedule:
    # Runs at 00:00 UTC on the 1st day of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Fetch all history for proper git operations

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        # Add any other Python dependencies needed for PDF parsing here
        # pip install PyPDF2 pdfminer.six

    - name: Install Manus MCP CLI (if needed, or ensure it's available)
      # This step assumes manus-mcp-cli is available in the GitHub Actions runner environment
      # or can be installed. For this sandbox, it's pre-installed.
      # In a real GitHub Actions environment, you might need to provide a way to install it.
      run: echo "Manus MCP CLI assumed to be available or installed separately."

    - name: Copy automation script
      run: cp /home/ubuntu/update_dashboard_automation.py .

    - name: Run dashboard update script
      env:
        GITHUB_TOKEN: ${{ secrets.GH_PAT }} # Use a GitHub Personal Access Token
        # NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }} # If Netlify CLI was used directly
      run: python update_dashboard_automation.py

    - name: Commit and Push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add data/mystery_shopper_history.json index.html # Add other files if updated
        git commit -m "Automated: Monthly dashboard update" || echo "No changes to commit"
        git push
